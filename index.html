<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBR — Hub Onboarding</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f6fa;margin:0;padding:60px 20px;color:#1a1a1a;text-align:center}
  h1{font-size:32px;color:#c73a63;margin:0 0 12px}
  .sub{color:#666;margin-bottom:48px;font-size:15px}
  .grid{max-width:760px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .card{background:#fff;border-radius:12px;padding:36px;box-shadow:0 2px 12px rgba(0,0,0,.06);text-decoration:none;color:inherit;transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-4px);box-shadow:0 6px 24px rgba(0,0,0,.1)}
  .icon{font-size:48px;margin-bottom:12px}
  .card h2{margin:0 0 8px;font-size:20px;color:#c73a63}
  .card p{margin:0;color:#666;font-size:14px;line-height:1.5}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>🏗️ RBR Onboarding Hub</h1>
<p class="sub">Aggiungi clienti e promozioni al sistema RBR. Compila i form, il resto è automatico.</p>

<div class="grid">
  <a href="onboard-cliente.html" class="card">
    <div class="icon">🆕</div>
    <h2>Nuovo cliente</h2>
    <p>Aggiungi uno store RBR al Data Store <code>rbr_clients</code>. Webhook GHL + iPratico key.</p>
  </a>

  <a href="onboard-promo.html" class="card">
    <div class="icon">🎟️</div>
    <h2>Nuova promozione</h2>
    <p>Aggiungi/modifica coupon nel Data Store <code>rbr_coupons</code>. Idempotente.</p>
  </a>
</div>
</body>
</html>
